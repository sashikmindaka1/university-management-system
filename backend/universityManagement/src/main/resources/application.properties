spring.application.name=universityManagement

# Reads from environment variables in deployed environments (see Azure App Service
# Configuration > Application settings). Falls back to local Postgres defaults for
# local development - update the fallback username/password to your own local setup,
# or better, export these as env vars locally too and never commit real credentials here.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/universityManagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}